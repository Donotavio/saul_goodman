name: Claude Code Agent

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/claude')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/claude'))

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "/claude"
          prompt: |
            REGRAS OBRIGATORIAS:
            1. NUNCA faca commit diretamente na branch main.
            2. SEMPRE crie uma nova branch com nome descritivo (ex: claude/fix-issue-123, claude/feat-nova-funcionalidade).
            3. SEMPRE abra um Pull Request com descricao clara do que foi feito.
            4. NUNCA faca merge automatico. O PR deve aguardar revisao e aprovacao humana.
            5. NUNCA use a tool merge_pull_request ou git push para main.
            6. Ao terminar, comente na issue/PR original informando que o PR foi criado e precisa de revisao.
            7. Siga as convencoes do projeto definidas em CLAUDE.md.

            Tarefa solicitada:
            ${{ github.event.comment.body }}
          settings: |
            {
              "permissions": {
                "deny": [
                  "Bash(git push origin main:*)",
                  "Bash(git push -f:*)",
                  "Bash(git push --force:*)",
                  "Bash(git checkout main && git merge:*)",
                  "mcp__github__merge_pull_request"
                ]
              }
            }
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ATLASSIAN_TOKEN: ${{ secrets.ATLASSIAN_TOKEN }}
